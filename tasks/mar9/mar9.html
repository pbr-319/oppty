
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DesignFrame - AI Creative Suite</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
   
</head>
<body>

<div class="sidebar">
    <div class="logo-container">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            DesignFrame
        </div>
        <div class="subtitle">AI-Powered Creative Suite</div>
    </div>

    <div>
        <div class="section-title">AI Image Generator</div>
        <textarea id="ai-prompt" placeholder="A futuristic city with neon lights, digital art style..."></textarea>
        <button id="generate-btn" class="btn" style="margin-top:12px; width:100%;">
            <span class="loader" id="ai-loader"></span>
            <span id="btn-text">Generate AI Art</span>
        </button>
    </div>

    <div>
        <div class="section-title">Add Elements</div>
        <div class="shapes-grid">
            <button class="shape-btn" data-type="square">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                Square
            </button>
            <button class="shape-btn" data-type="circle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
                Circle
            </button>
        </div>
    </div>

    <div id="element-properties" class="properties-panel">
        <div class="section-title" style="margin-top:0">Properties</div>
        <div class="prop-group">
            <label class="prop-label">Color</label>
            <input type="color" id="elem-color" value="#3b82f6">
        </div>
        <div class="prop-group">
            <label class="prop-label">Size</label>
            <input type="range" id="elem-size" min="20" max="400" value="120">
        </div>
        <div class="prop-group">
            <label class="prop-label">Opacity</label>
            <input type="range" id="elem-opacity" min="0" max="100" value="100">
        </div>
        <button class="btn btn-danger" id="delete-elem" style="width:100%;">Delete Element</button>
    </div>

    <div>
        <div class="section-title">Canvas Settings</div>
        <div class="prop-group">
            <label class="prop-label">Background Color</label>
            <input type="color" id="canvas-bg" value="#ffffff">
        </div>
        <div class="prop-group">
            <label class="prop-label">Frame Roundness</label>
            <input type="range" id="canvas-radius" min="0" max="100" value="12">
        </div>
    </div>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
        <button id="clear-canvas" class="btn btn-outline" style="width:100%;">Clear All</button>
        <button id="download-btn" class="btn" style="width:100%;">Download Frame</button>
    </div>
</div>

<div class="main">
    <div class="canvas-area">
        <div class="canvas-container" id="capture-area">
            <div class="canvas" id="canvas">
                <div class="empty-state" id="empty-state">
                    <h3>Your canvas is empty</h3>
                    <p>Enter a prompt to generate AI art or add shapes from the sidebar.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-footer">
        <div style="font-size: 0.85rem; color: var(--text-muted)">
            Composition: <span id="res-display">800 × 500</span> px
        </div>
        <div style="color: #64748b; font-size: 0.85rem; font-weight: 500;">
            Powered by Gemini & Imagen 4.0
        </div>
    </div>
</div>

<div id="toast" class="toast">Action completed!</div>

<script src="mar9.js"></script>

</body>
</html>
